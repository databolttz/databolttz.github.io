<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Databolttz Research</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-width: 85%;
            max-height: 85%;

            /* smooth professional appearance */
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* optional subtle watermark text */
        .brand-text {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #888;
            font-family: Arial, sans-serif;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="logo-container">
        <img src="WhatsApp Image 2026-06-08 at 10.38.46.jpeg" alt="Databolttz Logo">
    </div>

    <div class="brand-text">
        Databolttz Research & Statistical Consulting Services
    </div>

</body>
</html>
